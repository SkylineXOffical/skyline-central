<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Central - Skypaws Bank</title>
    <style>
        body {
            background-color: #111214;
            color: #D6C7E1;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 { 
            color: #ffffff; 
            font-size: 2.5rem; 
            letter-spacing: 2px; 
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(148, 114, 241, 0.3);
        }
        .subtitle { 
            color: #949ba4; 
            font-size: 1rem; 
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card {
            background-color: #1e1f22;
            border-radius: 16px;
            padding: 35px 25px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #2b2d31;
        }
        .currency-title { 
            font-size: 1.1rem; 
            color: #b5bac1; 
            font-weight: 500;
        }
        .currency { 
            font-size: 3.8rem; 
            margin: 20px 0; 
            color: #fff; 
            font-weight: 800;
        }
        .status-container {
            display: inline-flex;
            align-items: center;
            background-color: rgba(35, 165, 90, 0.1);
            color: #23a55a;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 35px;
            border: 1px solid rgba(35, 165, 90, 0.2);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #23a55a;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #23a55a;
        }
        .btn {
            display: block;
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(88, 101, 242, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>🐾 ꜱᴋʏᴘᴀᴡꜱ ʙᴀɴᴋ 🐾</h1>
    <div class="subtitle">Official Skyline Central Economy Hub</div>

    <div class="card">
        <div class="currency-title">Total Server Wealth</div>
        <div class="currency">🐾 0</div>
        
        <div class="status-container">
            <span class="status-dot"></span>
            Economy Online
        </div>
        
        <a href="https://discord.gg/hkURt2yfs6" class="btn" target="_blank">Join Discord Server</a>
    </div>

</body>
</html>
