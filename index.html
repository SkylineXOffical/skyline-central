<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Central - Skypaws Bank</title>
    <style>
        body {
            background-color: #111214;
            color: #D6C7E1;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 { color: #ffffff; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { color: #8a8f98; font-size: 1rem; margin-bottom: 30px; }
        .card {
            background-color: #1e1f22;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid #2b2d31;
        }
        .currency-title { font-size: 1.2rem; uppercase; color: #b5bac1; }
        .currency { font-size: 3.5rem; margin: 15px 0; color: #fff; font-weight: bold; }
        .status { color: #23a55a; font-size: 0.9rem; margin-bottom: 25px; }
        .btn {
            display: inline-block;
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <h1>🐾 ꜱᴋʏᴘᴀᴡꜱ ʙᴀɴᴋ 🐾</h1>
    <div class="subtitle">Official Skyline Central Economy Hub</div>

    <div class="card">
        <div class="currency-title">Total Server Wealth</div>
        <div class="currency">🐾 0</div>
        <div class="status">● System Live</div>
        <a href="https://discord.gg/yourlink" class="btn">Join Discord Server</a>
    </div>

</body>
</html>
